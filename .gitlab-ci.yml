stages:
  - build
  - deploy

build:
  stage: build
  image: node:22
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main

deploy:
  stage: deploy
  image: ubuntu:22.04
  script:
    - apt-get update -qq && apt-get install -y -qq rsync openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - chmod 600 "$SSH_PRIVATE_KEY_PORTFOLIO"
    - cat "$SSH_PRIVATE_KEY_PORTFOLIO" | head -3
    - wc -l "$SSH_PRIVATE_KEY_PORTFOLIO"
    - file "$SSH_PRIVATE_KEY_PORTFOLIO"
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - rsync -avz --delete
        -e "ssh -i $SSH_PRIVATE_KEY_PORTFOLIO -o StrictHostKeyChecking=no"
        dist/ $DEPLOY_USER@$DEPLOY_HOST:/var/www/portfolio/
    - ssh -i "$SSH_PRIVATE_KEY_PORTFOLIO"
        $DEPLOY_USER@$DEPLOY_HOST
        "sudo chown -R www-data:www-data /var/www/portfolio"
  only:
    - main
  needs:
    - build