stages:
  - build
  - deploy

build:
  stage: build
  image: node:22
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main

deploy:
  stage: deploy
  script:
    - apt-get update -qq && apt-get install -y -qq rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - rsync -avz --delete dist/ $DEPLOY_USER@$DEPLOY_HOST:/var/www/portfolio/
    - ssh $DEPLOY_USER@$DEPLOY_HOST "sudo chown -R www-data:www-data /var/www/portfolio"
  only:
    - main
  needs:
    - build