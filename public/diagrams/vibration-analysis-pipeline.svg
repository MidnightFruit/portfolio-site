<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 300" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <rect width="540" height="300" fill="#0d1117"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L0,7 L8,4 z" fill="#484f58"/>
    </marker>
  </defs>

  <!-- Одноплатник — внешний триггер -->
  <rect x="20" y="15" width="200" height="32" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="120" y="36" text-anchor="middle" font-size="11" fill="#c9d1d9">Одноплатник — внешний триггер</text>

  <!-- UDP arrow -->
  <line x1="220" y1="31" x2="252" y2="31" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="236" y="24" text-anchor="middle" font-size="10" fill="#8b949e">UDP</text>

  <!-- Захват кадров -->
  <rect x="255" y="15" width="150" height="32" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="330" y="36" text-anchor="middle" font-size="11" fill="#c9d1d9">Захват кадров</text>

  <!-- Arrow down -->
  <line x1="330" y1="47" x2="330" y2="76" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Поиск AruCo-маркеров -->
  <rect x="250" y="78" width="160" height="32" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="330" y="99" text-anchor="middle" font-size="11" fill="#c9d1d9">Поиск AruCo-маркеров</text>

  <!-- Arrow down with label -->
  <line x1="330" y1="110" x2="330" y2="152" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="136" text-anchor="middle" font-size="10" fill="#8b949e">координаты каждого маркера</text>

  <!-- Расчёт амплитуды и частоты -->
  <rect x="240" y="154" width="180" height="32" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="330" y="175" text-anchor="middle" font-size="11" fill="#c9d1d9">Расчёт амплитуды и частоты</text>

  <!-- Fork: stem down -->
  <line x1="330" y1="186" x2="330" y2="210" stroke="#484f58" stroke-width="1.5"/>
  <!-- Fork: horizontal bar -->
  <line x1="200" y1="210" x2="462" y2="210" stroke="#484f58" stroke-width="1.5"/>
  <!-- Fork: left arm -->
  <line x1="200" y1="210" x2="200" y2="246" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Fork: right arm -->
  <line x1="462" y1="210" x2="462" y2="246" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GUI: графики + переключение ед. изм. -->
  <rect x="80" y="248" width="240" height="32" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="200" y="269" text-anchor="middle" font-size="11" fill="#c9d1d9">GUI: графики + переключение ед. изм.</text>

  <!-- Запись в CSV -->
  <rect x="405" y="248" width="115" height="32" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="462" y="269" text-anchor="middle" font-size="11" fill="#c9d1d9">Запись в CSV файл</text>
</svg>
